version: "3"

includes:
  utils:
    internal: true
    taskfile: "../tools/yscope-dev-utils/exports/taskfiles/utils/utils.yaml"

vars:
  G_MAIN_DOCS_OUTPUT_DIR: "{{.G_BUILD_DIR}}/main-docs"
  G_NODE_DEPS_DIR: "{{.G_BUILD_DIR}}/node-deps"
  G_PROJECTS_DOCS_DIR: "{{.G_BUILD_DIR}}/project-docs"
  G_PUBLISHABLE_OUTPUT_DIR: "{{.G_BUILD_DIR}}/html"
  G_SPHINX_OUTPUT_DIR: "{{.G_BUILD_DIR}}/sphinx-html"
  G_NEXT_OUTPUT_DIR: "{{.G_BUILD_DIR}}/next-html"
  G_VENV_CHECKSUM_FILE: "{{.G_BUILD_DIR}}/docs#venv.md5"
  G_VENV_DIR: "{{.G_BUILD_DIR}}/venv"

tasks:
  build:
    deps: ["build-main-docs"]
    cmds:
      - "rm -rf '{{.G_PUBLISHABLE_OUTPUT_DIR}}'"
      - "mkdir -p '{{.G_PUBLISHABLE_OUTPUT_DIR}}'"
      - "rsync -a '{{.G_MAIN_DOCS_OUTPUT_DIR}}/' '{{.G_PUBLISHABLE_OUTPUT_DIR}}/'"
      - task: "symlink-project-docs"

  download-projects:
    deps: ["venv"]
    cmds:
      - |-
        . "{{.G_VENV_DIR}}/bin/activate"
        python3 scripts/download-projects.py --build-dir "{{.G_PROJECTS_DOCS_DIR}}"

  release-tar:
    deps: ["build"]
    cmd: >-
      tar czf "{{.G_BUILD_DIR}}/yscope-docs.tar.gz"
      -h
      -C "$(dirname "{{.G_PUBLISHABLE_OUTPUT_DIR}}")"
      "$(basename "{{.G_PUBLISHABLE_OUTPUT_DIR}}")"

  serve:
    deps:
      - "build"
      - "http-server"
    cmd: |-
      npm --prefix '{{.G_NODE_DEPS_DIR}}' exec http-server '{{.G_PUBLISHABLE_OUTPUT_DIR}}' -c-1

  build-main-docs:
    internal: true
    vars:
      CHECKSUM_FILE: "{{.G_BUILD_DIR}}/{{.TASK | replace \":\" \"#\"}}.md5"
      OUTPUT_DIR: "{{.G_MAIN_DOCS_OUTPUT_DIR}}"
    sources:
      - "{{.G_VENV_CHECKSUM_FILE}}"
      - "{{.ROOT_DIR}}/docs/**/*"
      - "{{.TASKFILE}}"
    generates: ["{{.CHECKSUM_FILE}}"]
    run: "once"
    deps:
      - task: "utils:checksum:validate"
        vars:
          CHECKSUM_FILE: "{{.CHECKSUM_FILE}}"
          INCLUDE_PATTERNS: ["{{.OUTPUT_DIR}}"]
      - "venv"
    cmds:
      - |-
        # Build Sphinx docs
        . "{{.G_VENV_DIR}}/bin/activate"
        sphinx-build -a -E -c docs -b html docs "{{.G_SPHINX_OUTPUT_DIR}}"

      - |-
        # Build Next.js homepage
        rm -rf docs/out docs/.next
        cd docs
        npm install --no-audit --no-fund
        npm run build
        cd -
        mkdir -p "{{.G_NEXT_OUTPUT_DIR}}"
        rsync -a docs/out/ "{{.G_NEXT_OUTPUT_DIR}}/"

      - |-
        # Merge outputs: Sphinx first, then Next.js (homepage handling)
        mkdir -p "{{.OUTPUT_DIR}}"
        
        # Copy Sphinx docs (dev-guide/ and other content)
        rsync -a "{{.G_SPHINX_OUTPUT_DIR}}/" "{{.OUTPUT_DIR}}/"
        
        # Remove Sphinx's root index.html (we'll replace with Next.js)
        rm -f "{{.OUTPUT_DIR}}/index.html"
        
        # Copy Next.js export (includes root index.html for /)
        rsync -a "{{.G_NEXT_OUTPUT_DIR}}/" "{{.OUTPUT_DIR}}/"

      # This command must be last
      - task: "utils:checksum:compute"
        vars:
          CHECKSUM_FILE: "{{.CHECKSUM_FILE}}"
          INCLUDE_PATTERNS: ["{{.OUTPUT_DIR}}"]

  http-server:
    internal: true
    vars:
      CHECKSUM_FILE: "{{.G_BUILD_DIR}}/{{.TASK | replace \":\" \"#\"}}.md5"
      OUTPUT_DIR: "{{.G_NODE_DEPS_DIR}}"
    sources:
      - "{{.ROOT_TASKFILE}}"
      - "{{.TASKFILE}}"
    generates: ["{{.CHECKSUM_FILE}}"]
    run: "once"
    deps:
      - ":init"
      - task: "utils:checksum:validate"
        vars:
          CHECKSUM_FILE: "{{.CHECKSUM_FILE}}"
          INCLUDE_PATTERNS: ["{{.OUTPUT_DIR}}"]
    cmds:
      - "rm -rf '{{.OUTPUT_DIR}}'"
      - "npm --prefix '{{.OUTPUT_DIR}}' install http-server"

      # This command must be last
      - task: "utils:checksum:compute"
        vars:
          CHECKSUM_FILE: "{{.CHECKSUM_FILE}}"
          INCLUDE_PATTERNS: ["{{.OUTPUT_DIR}}"]

  # For each project in `G_PROJECT_DOCS_DIR`, and each version of a project, symlinks their built
  # docs (if they exist) into the publishable output directory.
  symlink-project-docs:
    internal: true
    run: "once"
    cmds:
      - |-
        cd "{{.G_PROJECTS_DOCS_DIR}}" || exit 0
        for project_dir in */; do
          project_name="${project_dir%/}"

          for version_dir in "${project_dir}"/*/; do
            version_name=$(basename "${version_dir}")

            built_docs_dir="${version_dir}/build/docs/html"
            if [ -d "${built_docs_dir}" ]; then
              link_target="{{.G_PUBLISHABLE_OUTPUT_DIR}}/${project_name}/${version_name}"
              mkdir -p "$(dirname "${link_target}")"
              ln -sf "$(readlink -f "${built_docs_dir}")" "${link_target}"
            else
              echo "Warning: No built docs found for ${project_name}@${version_name}"
            fi
          done
        done

  venv:
    internal: true
    vars:
      CHECKSUM_FILE: "{{.G_VENV_CHECKSUM_FILE}}"
      OUTPUT_DIR: "{{.G_VENV_DIR}}"
      REQUIREMENTS_FILE: "{{.ROOT_DIR}}/requirements.txt"
    sources:
      - "{{.REQUIREMENTS_FILE}}"
      - "{{.TASKFILE}}"
    generates: ["{{.CHECKSUM_FILE}}"]
    run: "once"
    deps:
      - ":init"
      - task: "utils:checksum:validate"
        vars:
          CHECKSUM_FILE: "{{.CHECKSUM_FILE}}"
          INCLUDE_PATTERNS: ["{{.OUTPUT_DIR}}"]
    cmds:
      - task: "utils:misc:create-venv"
        vars:
          LABEL: "docs"
          OUTPUT_DIR: "{{.OUTPUT_DIR}}"
          REQUIREMENTS_FILE: "{{.REQUIREMENTS_FILE}}"

      # This command must be last
      - task: "utils:checksum:compute"
        vars:
          CHECKSUM_FILE: "{{.CHECKSUM_FILE}}"
          INCLUDE_PATTERNS: ["{{.OUTPUT_DIR}}"]
