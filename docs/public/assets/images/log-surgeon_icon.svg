<svg
  width="46"
  height="32"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <!-- Mask to cut out voids -->
    <mask id="voidMask">
      <rect x="0" y="0" width="46" height="32" fill="white" />
      <!-- Void squares nudged slightly up -->
      <rect x="6" y="5" width="6" height="6" rx="1.5" fill="black" />
      <rect x="15" y="11" width="6" height="6" rx="1.5" fill="black" />
      <rect x="6" y="19" width="6" height="6" rx="1.5" fill="black" />
    </mask>
  </defs>

  <!-- Main square (filled) with voids cut out -->
  <rect
    x="0"
    y="3"
    width="24"
    height="24"
    rx="5"
    fill="#0D6EFD"
    stroke="#0D6EFD"
    stroke-width="2"
    mask="url(#voidMask)"
  />

  <!-- Arrow -->
  <line
    x1="28"
    y1="16"
    x2="36"
    y2="16"
    stroke="#0D6EFD"
    stroke-width="1.5"
    stroke-linecap="round"
  />
  <polyline
    points="33,13 36,16 33,19"
    fill="none"
    stroke="#0D6EFD"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Extracted pieces -->
  <rect
    x="38"
    y="0"
    width="8"
    height="8"
    rx="2"
    fill="#0D6EFD"
    stroke="#0D6EFD"
    stroke-width="1"
  />
  <rect
    x="38"
    y="12"
    width="8"
    height="8"
    rx="2"
    fill="#0D6EFD"
    stroke="#0D6EFD"
    stroke-width="1"
  />
  <rect
    x="38"
    y="24"
    width="8"
    height="8"
    rx="2"
    fill="#0D6EFD"
    stroke="#0D6EFD"
    stroke-width="1"
  />
</svg>
